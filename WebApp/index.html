        /* Адна вобласць пракруткі ўнутры дадатка — без пракруткі ўсяго акна (мабільныя браўзеры менш «схоўваюць» палі URL). */
        html {
            height: 100%;
            height: 100dvh;
        }
        body {
            height: 100%;
            max-height: 100dvh;
            overflow: hidden;
        }
        #app {
            height: 100%;
            max-height: 100%;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* Без адлюстравання скролбараў (колца/свайп працуе як раней).
           scrollbar-width толькі ў @supports — Safari / стары Chrome не падтрымліваюць уласцівасць, але хаваюць скрол праз ::-webkit-scrollbar ніжэй. */
        * {
            -ms-overflow-style: none;
        }
        @supports (scrollbar-width: none) {
            * {
                scrollbar-width: none;
            }
        }
        *::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
        /* Фон як bg_gradient_dark.xml (315°) */

            height: 100%;

        }

        }
        .prayer-detail-html details.ordo-missae-section > summary.ordo-missae-section-summary::-webkit-details-marker {

        .prayer-detail-html details.ordo-missae-section > summary.ordo-missae-section-summary::after {

            top: 50%;

            margin: 0;

        /*

        .totus-read-15 {
            font-size: calc(15px * var(--totus-read-scale, 0.925)) !important;

        .totus-read-16 {

        /* Цветовые схемы приложения (current | white | dark | beige). */

    <script>
        (function () {
            try {
                var k = 'totus_web_text_step';
                var n = parseInt(localStorage.getItem(k), 10);
                if (!Number.isFinite(n)) n = 0;
                n = Math.max(0, Math.min(4, n));
                var base = 0.925;
                var scale = base * (1 + n * 0.25);
                document.documentElement.style.setProperty('--totus-read-scale', String(scale));
                document.documentElement.style.fontSize = '16px';
            } catch (e) { /* ignore */ }
        })();
    </script>
